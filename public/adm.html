<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Administração</title>
    <link rel="stylesheet" href="admEstilo.css">
</head>
<body>
    <div class="container">
        <h1>Painel de Administração</h1>

        <div class="card">
            <h2>Controle de Presença</h2>
            <div class="info-display">
                <p><strong>Pessoas na sala:</strong> <span id="quantidadeAtual">...</span></p>
                <p>
                    <strong>Sala:</strong>
                    <select id="salaFiltro" style="min-width: 220px;">
                        <option value="">Todas as Salas</option>
                    </select>
                </p>
            </div>
            <div class="actions">
                <button id="btnAtualizarQtd" class="btn-primary">Atualizar Contagem</button>
                <button id="btnAddPresenca" class="btn-primary">Adicionar Presença</button>
                <button id="btnReduzir" class="btn-danger">Remover Último Check-in</button>
                <button id="btnLimpar" class="btn-danger">Zerar Contagem</button>
            </div>
        </div>

        <div class="card">
            <h2>Salas do Evento</h2>
            <div class="actions">
                <input type="text" id="salaInput" placeholder="Nome da sala" style="flex: 1; min-width: 180px;" />
                <button id="btnAddSala" class="btn-primary">Adicionar Sala</button>
            </div>
            <ul id="listaSalas" style="margin-top: 10px; padding-left: 20px;"></ul>
        </div>

        <div class="card">
            <h2>Gestão do Sistema</h2>
            <div class="info-display">
                <p>
                    <strong>Gerar QR Code para sala:</strong>
                    <select id="salaSelect" style="min-width: 220px;">
                        <option value="">Selecione uma sala</option>
                    </select>
                </p>
            </div>
            <div class="actions">
                <button id="btnGerarQRCode">Gerar Novo QR Code</button>
                <a href="/relatorio" class="btn-secondary" target="_blank">Ver Relatório de Presença</a>
                <a href="/resetls" class="btn-secondary" target="_blank">Resetar Memória de Check-in (para um dispositivo)</a>
            </div>
        </div>

        <div id="status" class="status-message">
            <p>Pronto.</p>
        </div>
         <div style="text-align: center; margin-top: 20px;">
            <p> by Jeferson Costa<p/>
        </div>
    </div>

    <script src="admScript.js"></script>
</body>
</html>
