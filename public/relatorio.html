<!DOCTYPE html>

    <title>Relatório de Presença</title>
    <link rel="stylesheet" href="relatorioEstilo.css">
</head>
<body>
    <h1>Relatório de Presença</h1>

        <strong>Quantidade Total:</strong> <span id="quantidadeTotal">0</span> pessoas

        <button id="btnCopiar" class="btn-copiar" style="display: none;">Copiar Nomes</button>
    </div>
    <ul id="listaNomes">

    </ul>
    <div style="text-align: center;">
        <p> by Jeferson Costa<p/>
    </div>

    <script src="relatorioScript.js"></script>
