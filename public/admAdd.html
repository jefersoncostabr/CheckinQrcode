<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Presença Manualmente</title>
    <!-- Reutiliza o CSS do check-in para manter o padrão visual -->
    <link rel="stylesheet" href="/checkin.css">
    <style>
        /* Ajustes específicos para a tela de ADM */
        .btn-voltar {
            background-color: #6c757d;
            margin-top: 10px;
        }
        .btn-voltar:hover {
            background-color: #5a6268;
        }
        .status-msg {
            margin-top: 10px;
            font-weight: bold;
            height: 20px; /* Reserva espaço */
        }
    </style>
</head>
<body>
    <h1>Adicionar Presença (ADM)</h1>
    <p>Digite o nome para adicionar à lista.</p>
    
    <div style="margin-bottom: 15px;">
        <label for="salaSelect" style="display:block; margin-bottom: 6px; font-weight: bold;">Sala:</label>
        <select id="salaSelect" style="padding: 10px; font-size: 1rem; width: 80%; max-width: 320px; border-radius: 5px; border: 1px solid #ccc;"></select>
    </div>

    <div style="margin-bottom: 15px;">
        <input type="text" id="nomeInput" placeholder="Nome da pessoa" required 
               style="padding: 10px; font-size: 1rem; width: 80%; max-width: 300px; border-radius: 5px; border: 1px solid #ccc;">
    </div>

    <button id="btn" onclick="adicionarManual()">Confirmar Presença</button>
    <button class="btn-voltar" onclick="window.location.href='/adm'">Voltar ao Painel</button>

    <div id="statusMsg" class="status-msg"></div>

    <script>
        const nomeInput = document.getElementById('nomeInput');
        const salaSelect = document.getElementById('salaSelect');
        const statusMsg = document.getElementById('statusMsg');

        // Foca no input ao abrir a página
        nomeInput.focus();

        async function carregarSalas() {
            try {
                const response = await fetch('/api/salas');
                if (!response.ok) throw new Error('Falha ao carregar salas.');
                const data = await response.json();
                const salas = Array.isArray(data.salas) ? data.salas : [];

                salaSelect.innerHTML = '';
                salas.forEach(sala => {
                    const opt = document.createElement('option');
                    opt.value = sala;
                    opt.textContent = sala;
                    salaSelect.appendChild(opt);
                });

                if (salas.length === 0) {
                    salaSelect.innerHTML = '<option value="">Nenhuma sala cadastrada</option>';
                }
            } catch (err) {
                console.error('Erro ao carregar salas:', err);
                salaSelect.innerHTML = '<option value="">Erro ao carregar salas</option>';
            }
        }

        // Permite adicionar apertando ENTER
        nomeInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                adicionarManual();
            }
        });

        async function adicionarManual() {
            const nome = nomeInput.value.trim();
            const sala = salaSelect.value;
            if (!nome) return;
            if (!sala) {
                statusMsg.style.color = 'red';
                statusMsg.innerText = 'Selecione uma sala antes de adicionar a presença.';
                return;
            }

            try {
                const res = await fetch('/add', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: nome, sala })
                });
                const data = await res.json();

                if(data.sucesso) { 
                    statusMsg.style.color = 'green';
                    statusMsg.innerText = `"${nome}" adicionado com sucesso! (Total na sala: ${data.novaQuantidade})`;
                    nomeInput.value = ''; // Limpa o campo para o próximo
                    nomeInput.focus();    // Mantém o foco no input
                } else { 
                    statusMsg.style.color = 'red';
                    statusMsg.innerText = data.mensagem;
                    // Não limpa o input em caso de erro (ex: nome duplicado) para permitir correção
                }
            } catch (e) { 
                statusMsg.style.color = 'red';
                statusMsg.innerText = 'Erro de conexão.';
            }
        }

        carregarSalas();
    </script>
</body>
</html>
